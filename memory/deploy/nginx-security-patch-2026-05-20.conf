##############################################################################
# PATCH SÉCURITÉ NGINX — Métro-Taxi (v2 — 20 mai 2026)
# Remplace le patch du 18/05/2026.
#
# RAISON v2 :
#   - 2 IPs malveillantes confirmées (intrusion + bombing OTP)
#   - On rate-limit aussi le verify-otp (pas que le login)
#   - Compte admin zombie supprimé en DB le 20/05/2026 ✅
#
# ⚠️ Ce fichier est un PATCH à appliquer EN COMPLÉMENT de la conf principale.
#
# 📍 INSTRUCTIONS DÉPLOIEMENT VPS :
#
#   1. Sur ton VPS Hostinger, ouvre la conf principale Nginx :
#      sudo nano /etc/nginx/sites-available/Metro-Taxi
#
#   2. Ajoute le BLOC A ci-dessous TOUT EN HAUT du fichier
#      (avant le premier "server {")
#
#   3. Dans le bloc `server { ... listen 443 ssl ... }`, à L'INTÉRIEUR,
#      ajoute le BLOC B (juste après la ligne "server_name metro-taxi.com")
#
#   4. Teste : sudo nginx -t
#   5. Recharge : sudo systemctl reload nginx
##############################################################################


# ============================================================================
# BLOC A — À PLACER TOUT EN HAUT du fichier Metro-Taxi (avant le 1er server{})
# (Définit les zones de rate limiting + la blacklist IP)
# ============================================================================

# Rate limit strict sur le LOGIN admin : max 5 tentatives par IP / 15 min
limit_req_zone $binary_remote_addr zone=metro_admin_login:10m rate=5r/15m;

# Rate limit strict sur la VÉRIF OTP : max 10 essais par IP / 5 min
limit_req_zone $binary_remote_addr zone=metro_admin_otp:10m rate=10r/5m;

# Blacklist d'IPs malveillantes (ajoute des lignes ici si nouvelles attaques)
geo $blocked_ip {
    default 0;
    37.67.127.14 1;    # Drancy SFR — intrusion admin 18/05/2026
    34.16.56.64 1;     # Google Cloud VM — bombing OTP 20/05/2026
    # Ajoute d'autres IPs ici au format : XX.XX.XX.XX 1;
}


# ============================================================================
# BLOC B — À PLACER DANS le `server { listen 443 ssl ... }`
# JUSTE APRÈS la ligne `server_name metro-taxi.com www.metro-taxi.com;`
# ============================================================================

    # Blocage des IPs blacklistées (retourne 403 Forbidden immédiatement)
    if ($blocked_ip) {
        return 403 "Forbidden";
    }

    # Rate limit sur l'endpoint LOGIN admin
    location = /api/auth/login {
        limit_req zone=metro_admin_login burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate limit sur l'endpoint VERIFY OTP (anti-bruteforce du code 6 chiffres)
    location = /api/auth/admin/verify-otp {
        limit_req zone=metro_admin_otp burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


##############################################################################
# 🛡️ EFFET DE CE PATCH :
#
#   ✅ 37.67.127.14 et 34.16.56.64 → 403 Forbidden IMMÉDIAT (avant FastAPI)
#
#   ✅ Toute autre IP > 5 logins en 15 min → 429 Too Many Requests
#
#   ✅ Toute autre IP > 10 verify-otp en 5 min → 429 Too Many Requests
#      (empêche brute force du code 6 chiffres : 10 essais c'est rien sur 1M)
#
#   ✅ Tes propres connexions admin restent fluides (tu fais 1-2 essais max)
#
# 📊 POUR VOIR LES TENTATIVES BLOQUÉES PLUS TARD :
#      sudo tail -f /var/log/nginx/access.log | grep " 403 \| 429 "
#
# 🔁 EN COMPLÉMENT (DÉJÀ FAIT CÔTÉ CODE le 20/05/2026) :
#   - Auto-purge des comptes admin "zombie" au startup backend
#   - Throttle 3 envois d'OTP max par IP / 15 min (anti email-bombing)
#   - Invalidation auto des OTPs en cours à chaque restart
