##############################################################################
# PATCH SÉCURITÉ NGINX — Métro-Taxi
# Date : 18 mai 2026
# Raison : Tentative d'intrusion détectée depuis IP 37.67.127.14 (Drancy, SFR)
#
# ⚠️ Ce fichier est un PATCH à appliquer EN COMPLÉMENT de la conf principale.
#
# 📍 INSTRUCTIONS DÉPLOIEMENT VPS :
#
#   1. Sur ton VPS Hostinger, ouvre la conf principale Nginx :
#      sudo nano /etc/nginx/sites-available/metro-taxi.conf
#
#   2. Ajoute le BLOC A ci-dessous TOUT EN HAUT du fichier
#      (avant le premier "server {")
#
#   3. Dans le bloc `server { ... listen 443 ssl ... }`, à L'INTÉRIEUR,
#      ajoute le BLOC B (juste après la ligne "server_name metro-taxi.com")
#
#   4. Teste : sudo nginx -t
#   5. Recharge : sudo systemctl reload nginx
##############################################################################


# ============================================================================
# BLOC A — À PLACER TOUT EN HAUT du fichier metro-taxi.conf
# (Définit la zone de rate limiting login + la blacklist IP)
# ============================================================================

# Rate limiting strict sur les endpoints de login admin
# Max 5 tentatives par IP toutes les 15 minutes
limit_req_zone $binary_remote_addr zone=metro_admin_login:10m rate=5r/15m;

# Blacklist d'IPs malveillantes (ajoute des lignes ici si nouvelles attaques)
geo $blocked_ip {
    default 0;
    37.67.127.14 1;    # Drancy SFR — tentative intrusion admin du 18/05/2026
    # Ajoute d'autres IPs ici au format : XX.XX.XX.XX 1;
}


# ============================================================================
# BLOC B — À PLACER DANS le `server { listen 443 ssl ... }`
# JUSTE APRÈS la ligne `server_name metro-taxi.com www.metro-taxi.com;`
# ============================================================================

    # Blocage des IPs blacklistées (retourne 403 Forbidden immédiatement)
    if ($blocked_ip) {
        return 403 "Forbidden";
    }

    # Rate limiting strict sur les endpoints admin sensibles
    location ~ ^/api/admin/(login|verify-otp|request-otp) {
        limit_req zone=metro_admin_login burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


##############################################################################
# 🛡️ EFFET DE CE PATCH :
#
#   ✅ Toute requête venant de 37.67.127.14 → 403 Forbidden IMMÉDIAT
#      (le pirate ne peut même plus voir la page de login)
#
#   ✅ Toute autre IP qui tente plus de 5 fois en 15 min de se logger admin
#      → 429 Too Many Requests pendant 15 min
#
#   ✅ Tes propres connexions admin restent fluides (tu fais 1-2 essais max)
#
# 📊 POUR VOIR LES TENTATIVES BLOQUÉES PLUS TARD :
#      sudo tail -f /var/log/nginx/access.log | grep " 403 \| 429 "
#
