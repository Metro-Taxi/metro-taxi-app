##############################################################################
# PATCH SÉCURITÉ NGINX — Métro-Taxi (v3 — 20 mai 2026, FINAL)
# Remplace toutes les versions précédentes.
#
# 📌 HISTORIQUE :
#   v1 (18/05) : Blacklist IP + rate limit login
#   v2 (20/05) : + IP Google Cloud + rate limit OTP
#   v3 (20/05) : ❌ Plus de blacklist IP (la "37.67.127.14" était TON IP perso
#                SFR Drancy, faux positif). On garde uniquement le RATE LIMIT
#                qui s'auto-régule pour toute IP qui abuse.
#
# 📍 INSTRUCTIONS DÉPLOIEMENT VPS :
#
#   1. sudo nano /etc/nginx/sites-available/Metro-Taxi
#
#   2. Ajoute le BLOC A ci-dessous TOUT EN HAUT du fichier
#      (avant le premier "server {")
#
#   3. Dans le bloc `server { listen 443 ssl ... }`, à L'INTÉRIEUR,
#      ajoute le BLOC B (juste après la ligne "server_name metro-taxi.com")
#
#   4. Teste : sudo nginx -t
#   5. Recharge : sudo systemctl reload nginx
##############################################################################


# ============================================================================
# BLOC A — À PLACER TOUT EN HAUT du fichier Metro-Taxi (avant le 1er server{})
# ============================================================================

# Rate limit strict sur le LOGIN admin : max 5 tentatives par IP / 15 min
limit_req_zone $binary_remote_addr zone=metro_admin_login:10m rate=5r/15m;

# Rate limit strict sur la VÉRIF OTP : max 10 essais par IP / 5 min
limit_req_zone $binary_remote_addr zone=metro_admin_otp:10m rate=10r/5m;


# ============================================================================
# BLOC B — À PLACER DANS le `server { listen 443 ssl ... }`
# JUSTE APRÈS la ligne `server_name metro-taxi.com www.metro-taxi.com;`
# ============================================================================

    # Rate limit sur l'endpoint LOGIN admin
    location = /api/auth/login {
        limit_req zone=metro_admin_login burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate limit sur l'endpoint VERIFY OTP (anti-bruteforce du code 6 chiffres)
    location = /api/auth/admin/verify-otp {
        limit_req zone=metro_admin_otp burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


##############################################################################
# 🛡️ EFFET DE CE PATCH :
#
#   ✅ Toute IP > 5 logins en 15 min → 429 Too Many Requests
#      (toi tu fais 1-2 essais max, donc tu n'es JAMAIS bloqué)
#
#   ✅ Toute IP > 10 verify-otp en 5 min → 429 Too Many Requests
#      (empêche brute force du code 6 chiffres : 10 essais c'est rien sur 1M)
#
#   ✅ Pas de blacklist d'IP statique = pas de risque de te bloquer toi-même
#
# 📊 POUR VOIR LES IPs RATE-LIMITÉES PLUS TARD :
#      sudo tail -f /var/log/nginx/access.log | grep " 429 "
#
# 🔁 EN COMPLÉMENT (DÉJÀ FAIT CÔTÉ CODE le 20/05/2026) :
#   - Auto-purge des comptes admin "zombie" au startup backend
#   - Throttle 3 envois d'OTP max par IP / 15 min (anti email-bombing)
#   - Invalidation auto des OTPs en cours à chaque restart
##############################################################################
