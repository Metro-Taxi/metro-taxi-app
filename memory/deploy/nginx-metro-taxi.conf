##############################################################################
# CONFIGURATION NGINX PRODUCTION — Métro-Taxi
# Auteur : Charly · Date : 13 mai 2026
# Objectif : Résoudre le warning Chrome Android "application obsolète"
##############################################################################
#
# 📍 À DÉPOSER SUR LE VPS : /etc/nginx/sites-available/metro-taxi.conf
# 📝 ACTIVER :              sudo ln -sf /etc/nginx/sites-available/metro-taxi.conf /etc/nginx/sites-enabled/
# 🧪 TESTER :               sudo nginx -t
# 🔄 RECHARGER :            sudo systemctl reload nginx
#
# ⚠️ ADAPTE LES CHEMINS SUIVANTS À TON VPS :
#   - root        → /var/www/metro-taxi-app/frontend/build  (chemin du build React)
#   - ssl_*       → tes vrais chemins Let's Encrypt (souvent /etc/letsencrypt/live/metro-taxi.com/)
#   - proxy_pass  → l'adresse du backend FastAPI (souvent http://127.0.0.1:8001)
#
##############################################################################

# ============================================
# Cache sécurité par IP (pour le rate limiting nginx-level)
# ============================================
limit_req_zone $binary_remote_addr zone=metro_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=metro_api:10m rate=60r/m;

# ============================================
# Masquer la version nginx (info disclosure)
# ============================================
server_tokens off;
more_clear_headers Server;  # Optionnel : nécessite ngx_headers_more (sinon laisse en commentaire)

# ============================================
# Redirection HTTP → HTTPS
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name metro-taxi.com www.metro-taxi.com;

    # Let's Encrypt renew challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://metro-taxi.com$request_uri;
    }
}

# ============================================
# Serveur HTTPS principal
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name metro-taxi.com www.metro-taxi.com;

    # Redirige www → apex
    if ($host = www.metro-taxi.com) {
        return 301 https://metro-taxi.com$request_uri;
    }

    # ---- SSL / TLS ----
    ssl_certificate     /etc/letsencrypt/live/metro-taxi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/metro-taxi.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ============================================================
    # 🛡️ HEADERS DE SÉCURITÉ — LE FIX PRINCIPAL
    # ============================================================
    # → Ces 8 headers résolvent l'avertissement Chrome Android
    #   "Cette application est obsolète / déconseillée"
    # ============================================================

    # HSTS : force HTTPS pendant 2 ans (CRUCIAL en 2026)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Empêche le navigateur de deviner le Content-Type (anti-XSS)
    add_header X-Content-Type-Options "nosniff" always;

    # Anti-clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Anti-XSS pour vieux navigateurs (compatibilité)
    add_header X-XSS-Protection "1; mode=block" always;

    # Référent partiel (anti-tracking)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions navigateur (géoloc autorisée, mic/caméra non)
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=(), payment=(self), usb=(), interest-cohort=()" always;

    # Cross-Origin Opener Policy : isole la PWA (résout warning WebAPK obsolète)
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    # Content Security Policy : signal de site bien maintenu pour Safe Browsing
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.posthog.com https://us.i.posthog.com https://us-assets.i.posthog.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https: wss: https://*.posthog.com https://us.i.posthog.com; worker-src 'self' blob:; manifest-src 'self'; frame-ancestors 'self'; base-uri 'self';" always;

    # ============================================================
    # PWA — Cache control optimisé
    # ============================================================
    # Le service worker NE DOIT JAMAIS être caché agressivement
    location = /sw.js {
        root /var/www/metro-taxi-app/frontend/build;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        # Réapplique les headers de sécurité (sinon `add_header` est écrasé dans location)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Le manifest doit pouvoir être rafraîchi rapidement
    location = /manifest.json {
        root /var/www/metro-taxi-app/frontend/build;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        types { } default_type "application/manifest+json";
    }

    # ============================================================
    # 📦 SERVE LE BUILD REACT
    # ============================================================
    root /var/www/metro-taxi-app/frontend/build;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/javascript application/json application/xml text/css text/plain text/xml image/svg+xml application/manifest+json;

    # Static assets : cache long (hash dans le nom de fichier)
    location ~* \.(?:js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Images / icônes
    location ~* \.(?:png|jpg|jpeg|gif|ico|webp|svg)$ {
        expires 30d;
        add_header Cache-Control "public" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ============================================================
    # 🔌 BACKEND API → FastAPI
    # ============================================================
    location /api/ {
        limit_req zone=metro_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        client_max_body_size 50M;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # ============================================================
    # 🌐 SPA Fallback : toutes les routes React → index.html
    # ============================================================
    location / {
        limit_req zone=metro_general burst=50 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # ============================================================
    # 🔒 .well-known (Let's Encrypt + security.txt)
    # ============================================================
    location /.well-known/ {
        root /var/www/metro-taxi-app/frontend/build;
        try_files $uri =404;
    }

    # Bloquer l'accès aux fichiers sensibles
    location ~ /\.(?!well-known) { deny all; }
    location ~ \.(env|git|sql|bak|swp)$ { deny all; }
}
