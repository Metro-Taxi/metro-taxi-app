<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Métro-Taxi 16 langues - Stories</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: linear-gradient(160deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: white;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    top: -300px;
    right: -300px;
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(247, 198, 0, 0.18) 0%, transparent 70%);
    border-radius: 50%;
  }
  body::after {
    content: '';
    position: absolute;
    bottom: -300px;
    left: -300px;
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(247, 198, 0, 0.12) 0%, transparent 70%);
    border-radius: 50%;
  }

  .container {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 120px 80px;
    z-index: 2;
  }

  .top {
    text-align: center;
  }
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 22px;
    margin-bottom: 100px;
  }
  .logo-icon {
    width: 90px;
    height: 90px;
    background: #F7C600;
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
  }
  .logo-text {
    font-size: 46px;
    font-weight: 800;
    letter-spacing: -1.5px;
  }

  .badge {
    display: inline-block;
    background: rgba(247, 198, 0, 0.15);
    border: 2px solid rgba(247, 198, 0, 0.5);
    color: #F7C600;
    padding: 16px 36px;
    border-radius: 100px;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 60px;
    letter-spacing: 0.5px;
  }

  h1 {
    font-size: 130px;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -4px;
    margin-bottom: 50px;
  }
  h1 .yellow {
    color: #F7C600;
  }
  .subtitle {
    font-size: 32px;
    line-height: 1.5;
    color: rgba(255, 255, 255, 0.8);
    max-width: 850px;
    margin: 0 auto;
  }

  /* Flags grid */
  .middle {
    text-align: center;
  }
  .flags {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    max-width: 700px;
    margin: 0 auto;
  }
  .flag {
    aspect-ratio: 1;
    background: rgba(255, 255, 255, 0.06);
    border: 1.5px solid rgba(255, 255, 255, 0.12);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 70px;
  }

  .bottom {
    text-align: center;
  }
  .cta {
    background: #F7C600;
    color: black;
    padding: 38px 70px;
    border-radius: 100px;
    font-size: 42px;
    font-weight: 900;
    display: inline-block;
    letter-spacing: -0.8px;
    box-shadow: 0 25px 80px rgba(247, 198, 0, 0.4);
  }
  .cta-arrow {
    margin-left: 16px;
  }
  .footer {
    margin-top: 40px;
    color: rgba(255, 255, 255, 0.5);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="top">
    <div class="logo">
      <div class="logo-icon">🚖</div>
      <div class="logo-text">MÉTRO-TAXI</div>
    </div>
    <span class="badge">🌍 16 LANGUES</span>
    <h1>Voyagez<br/><span class="yellow">librement</span></h1>
    <p class="subtitle">Choisissez votre langue,<br/>écoutez l'expérience.</p>
  </div>

  <div class="middle">
    <div class="flags">
      <div class="flag">🇫🇷</div>
      <div class="flag">🇬🇧</div>
      <div class="flag">🇪🇸</div>
      <div class="flag">🇵🇹</div>
      <div class="flag">🇩🇪</div>
      <div class="flag">🇮🇹</div>
      <div class="flag">🇳🇱</div>
      <div class="flag">🇳🇴</div>
      <div class="flag">🇸🇪</div>
      <div class="flag">🇩🇰</div>
      <div class="flag">🇷🇺</div>
      <div class="flag">🇸🇦</div>
      <div class="flag">🇮🇳</div>
      <div class="flag">🇨🇳</div>
      <div class="flag">🇺🇸</div>
      <div class="flag">🚖</div>
    </div>
  </div>

  <div class="bottom">
    <div class="cta">metro-taxi.com<span class="cta-arrow">→</span></div>
    <div class="footer">SANS CONTRAINTE · SANS LIMITE</div>
  </div>
</div>
</body>
</html>
