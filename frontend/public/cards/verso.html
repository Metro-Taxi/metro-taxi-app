<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carte Visite Métro-Taxi — Verso</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { width: 1063px; height: 705px; overflow: hidden; background: #fff; }
  .card {
    width: 1063px; height: 705px;
    background: #FFD60A;
    position: relative;
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  /* Bandeau noir gauche */
  .left-band {
    position: absolute;
    top: 0; left: 0;
    width: 380px; height: 705px;
    background: #09090B;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
  }
  .left-band .icon-big {
    width: 110px; height: 110px;
    background: #FFD60A;
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
  }
  .left-band .icon-big svg { width: 72px; height: 72px; }
  .left-band .brand {
    color: #FFD60A;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 4px;
    line-height: 1;
    text-align: center;
  }
  .left-band .baseline {
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: center;
    margin-top: 4px;
  }
  /* Côté droit (contacts) */
  .contacts {
    position: absolute;
    top: 0; left: 380px;
    width: 683px; height: 705px;
    padding: 90px 60px;
    color: #09090B;
  }
  .contact-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #09090B;
    margin-bottom: 36px;
    opacity: 0.6;
  }
  .contact-row {
    display: flex; align-items: center; gap: 18px;
    margin-bottom: 28px;
  }
  .contact-row .ico {
    width: 44px; height: 44px;
    background: #09090B;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .contact-row .ico svg { width: 22px; height: 22px; }
  .contact-row .info {
    display: flex; flex-direction: column; gap: 2px;
  }
  .contact-row .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #09090B;
    opacity: 0.55;
  }
  .contact-row .value {
    font-size: 22px;
    font-weight: 700;
    color: #09090B;
    letter-spacing: -0.3px;
  }
  /* Footer */
  .footer {
    position: absolute;
    bottom: 30px; left: 380px; right: 30px;
    text-align: right;
    font-size: 11px;
    color: #09090B;
    opacity: 0.55;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="left-band">
      <div class="icon-big">
        <svg viewBox="0 0 24 24" fill="none" stroke="#09090B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1l-.8 1.63A6 6 0 0 0 2 12.42V16h2"/>
          <circle cx="6.5" cy="16.5" r="2.5"/>
          <circle cx="16.5" cy="16.5" r="2.5"/>
        </svg>
      </div>
      <div>
        <div class="brand">MÉTRO-TAXI</div>
        <div class="baseline">VTC · 0&nbsp;% COMMISSION</div>
      </div>
    </div>

    <div class="contacts">
      <div class="contact-title">Contact direct</div>

      <div class="contact-row">
        <div class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="#FFD60A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </div>
        <div class="info">
          <div class="label">Téléphone</div>
          <div class="value">06 68 55 00 19</div>
        </div>
      </div>

      <div class="contact-row">
        <div class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="#FFD60A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <div class="info">
          <div class="label">Email</div>
          <div class="value">contact@metro-taxi.com</div>
        </div>
      </div>

      <div class="contact-row">
        <div class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="#FFD60A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <div class="info">
          <div class="label">Site Web</div>
          <div class="value">metro-taxi.com</div>
        </div>
      </div>

    </div>

    <div class="footer">Inscription chauffeur · Programme partenariat flotte VTC</div>
  </div>
</body>
</html>
